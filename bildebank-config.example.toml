[face_recognition]
# InsightFace er valgfritt og er av som standard.
# Kopier denne filen til bildebank-config.toml hvis du vil teste.
enabled = false

# Forelopig tester vi bare CPU. GPU krever egen onnxruntime-gpu/CUDA-installasjon.
provider = "cpu"

# Modellene skal ligge lokalt i programmappen, ikke i brukerens hjemmemappe.
model_root = ".bildebank-insightface"
database_dir = ".bildebank-faces"
model_name = "buffalo_l"

[browser]
hide_out_of_focus = false
manual_person_controls_enabled = true
hotkey_hints_enabled = false

[browser.hotkeys]
# Tastene 1-5 kan settes til handlinger i run-server.
# Eksempler:
# "1" = { action = "h3", h3_cell = "871ec9c95ffffff" }
# "2" = { action = "person", person_name = "Kari" }
# "3" = { action = "manual_date", mode = "exact", date = "1980-07-15", note = "Satt med hurtigtast" }
# "4" = { action = "manual_date", mode = "between", date_from = "1980-06-01", date_to = "1980-08-31" }
# "5" = { action = "tag", tag_name = "Familie" }
# "1" = { action = "" }

[openclip]
# OpenCLIP brukes til tekstbasert bildesøk, for eksempel "strand".
# Dette er separat fra ansiktsgjenkjenning.
enabled = false
model_root = ".bildebank-openclip"

# Bruk "auto" for GPU hvis PyTorch finner CUDA, ellers CPU.
# Andre valg: "cpu" eller "cuda".
device = "cpu"

# Standardmodellen er raskere og lettere.
model_name = "ViT-B-32"
pretrained = "laion2b_s34b_b79k"

# Hvis du vil teste større og tregere modell, bruk:
# model_name = "ViT-L-14"
# pretrained = "laion2b_s32b_b82k"
