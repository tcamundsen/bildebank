<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bildebrowser</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #171717;
      --panel: #242424;
      --border: #3a3a3a;
      --text: #f2f2f2;
      --muted: #b8b8b8;
      --accent: #7db7ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    header,
    footer {
      background: var(--panel);
      border-color: var(--border);
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .topline,
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .title {
      font-weight: 700;
      margin-right: 12px;
    }

    button,
    label.pick {
      border: 1px solid var(--border);
      background: #303030;
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
      cursor: pointer;
      min-height: 38px;
    }

    button:hover,
    label.pick:hover {
      background: #3a3a3a;
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    input[type="file"] {
      display: none;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    .position {
      color: var(--accent);
      font-weight: 650;
    }

    main {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 10px;
      overflow: hidden;
    }

    .viewer {
      width: 100%;
      height: 100%;
      min-height: 0;
      display: grid;
      place-items: center;
      background: #0e0e0e;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    img,
    video {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      max-width: 560px;
      line-height: 1.5;
      padding: 24px;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 8px 12px;
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topline">
        <div class="title">Bildebrowser</div>
        <label class="pick">
          Velg målmappe
          <input id="picker" type="file" webkitdirectory directory multiple>
        </label>
        <span id="status" class="status">Ingen mappe valgt</span>
      </div>
      <div class="controls">
        <button id="prevYear" type="button">Forrige år</button>
        <button id="nextYear" type="button">Neste år</button>
        <button id="prevMonth" type="button">Forrige måned</button>
        <button id="nextMonth" type="button">Neste måned</button>
        <button id="prevItem" type="button">Forrige bilde</button>
        <button id="nextItem" type="button">Neste bilde</button>
        <span id="position" class="position"></span>
      </div>
    </header>

    <main>
      <div id="viewer" class="viewer">
        <div class="empty">
          Velg målmappen som inneholder årsmappene, for eksempel mappen med
          <code>2007/03/</code>, <code>2008/01/</code> og <code>udatert/</code>.
        </div>
      </div>
    </main>

    <footer id="filename">Ingen fil valgt</footer>
  </div>

  <script>
    const imageExt = new Set(["jpg", "jpeg", "png", "gif", "bmp", "webp", "tif", "tiff", "heic", "heif"]);
    const videoExt = new Set(["mp4", "mov", "m4v", "avi", "mpg", "mpeg", "mts", "m2ts", "3gp", "wmv"]);

    const state = {
      items: [],
      months: [],
      yearIndex: 0,
      monthIndex: 0,
      itemIndex: 0,
      objectUrl: null
    };

    const picker = document.getElementById("picker");
    const statusEl = document.getElementById("status");
    const positionEl = document.getElementById("position");
    const viewer = document.getElementById("viewer");
    const filenameEl = document.getElementById("filename");

    const buttons = {
      prevYear: document.getElementById("prevYear"),
      nextYear: document.getElementById("nextYear"),
      prevMonth: document.getElementById("prevMonth"),
      nextMonth: document.getElementById("nextMonth"),
      prevItem: document.getElementById("prevItem"),
      nextItem: document.getElementById("nextItem")
    };

    picker.addEventListener("change", () => {
      loadFiles(Array.from(picker.files || []));
    });

    buttons.prevYear.addEventListener("click", () => moveYear(-1));
    buttons.nextYear.addEventListener("click", () => moveYear(1));
    buttons.prevMonth.addEventListener("click", () => moveMonth(-1));
    buttons.nextMonth.addEventListener("click", () => moveMonth(1));
    buttons.prevItem.addEventListener("click", () => moveItem(-1));
    buttons.nextItem.addEventListener("click", () => moveItem(1));

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") moveItem(-1);
      if (event.key === "ArrowRight") moveItem(1);
      if (event.key === "ArrowUp") moveMonth(-1);
      if (event.key === "ArrowDown") moveMonth(1);
    });

    setButtonsEnabled(false);

    function loadFiles(files) {
      revokeObjectUrl();
      const items = files
        .map(fileToItem)
        .filter(Boolean)
        .sort(compareItems);

      state.items = items;
      state.months = buildMonths(items);
      state.yearIndex = 0;
      state.monthIndex = 0;
      state.itemIndex = 0;

      if (items.length === 0) {
        statusEl.textContent = "Fant ingen støttede bilder eller videoer";
        positionEl.textContent = "";
        filenameEl.textContent = "Ingen fil valgt";
        viewer.innerHTML = '<div class="empty">Ingen støttede bilder eller videoer ble funnet i valgt mappe.</div>';
        setButtonsEnabled(false);
        return;
      }

      statusEl.textContent = `${items.length} filer, ${state.months.length} måneder`;
      setButtonsEnabled(true);
      render();
    }

    function fileToItem(file) {
      const relativePath = file.webkitRelativePath || file.name;
      const parts = relativePath.split(/[\\/]+/).filter(Boolean);
      const ext = extension(file.name);
      const kind = imageExt.has(ext) ? "image" : videoExt.has(ext) ? "video" : null;
      if (!kind) return null;

      const dateParts = datePartsFromPath(parts);
      return {
        file,
        relativePath,
        kind,
        year: dateParts.year,
        month: dateParts.month,
        monthKey: dateParts.monthKey
      };
    }

    function datePartsFromPath(parts) {
      for (let i = 0; i < parts.length - 1; i += 1) {
        const year = parts[i];
        const month = parts[i + 1];
        if (/^(19|20)\d{2}$/.test(year) && /^(0[1-9]|1[0-2])$/.test(month)) {
          return { year, month, monthKey: `${year}-${month}` };
        }
      }
      if (parts.includes("udatert")) {
        return { year: "udatert", month: "", monthKey: "udatert" };
      }
      return { year: "ukjent", month: "", monthKey: "ukjent" };
    }

    function extension(name) {
      const index = name.lastIndexOf(".");
      return index >= 0 ? name.slice(index + 1).toLowerCase() : "";
    }

    function compareItems(a, b) {
      return a.monthKey.localeCompare(b.monthKey, "nb") ||
        a.relativePath.localeCompare(b.relativePath, "nb", { numeric: true });
    }

    function buildMonths(items) {
      const map = new Map();
      for (const item of items) {
        if (!map.has(item.monthKey)) map.set(item.monthKey, []);
        map.get(item.monthKey).push(item);
      }
      return Array.from(map.entries()).map(([key, monthItems]) => ({ key, items: monthItems }));
    }

    function currentMonth() {
      return state.months[state.monthIndex] || null;
    }

    function currentItem() {
      const month = currentMonth();
      return month ? month.items[state.itemIndex] : null;
    }

    function moveYear(delta) {
      if (state.months.length === 0) return;
      const current = currentMonth();
      const year = current.key.slice(0, 4);
      const years = Array.from(new Set(state.months.map(month => month.key.slice(0, 4))));
      const yearIndex = years.indexOf(year);
      const nextYear = years[yearIndex + delta];
      if (!nextYear) return;
      state.monthIndex = state.months.findIndex(month => month.key.startsWith(nextYear));
      state.itemIndex = 0;
      render();
    }

    function moveMonth(delta) {
      if (state.months.length === 0) return;
      const next = state.monthIndex + delta;
      if (next < 0 || next >= state.months.length) return;
      state.monthIndex = next;
      state.itemIndex = 0;
      render();
    }

    function moveItem(delta) {
      const month = currentMonth();
      if (!month) return;
      const nextItem = state.itemIndex + delta;
      if (nextItem >= 0 && nextItem < month.items.length) {
        state.itemIndex = nextItem;
        render();
        return;
      }
      const nextMonth = state.monthIndex + (delta > 0 ? 1 : -1);
      if (nextMonth < 0 || nextMonth >= state.months.length) return;
      state.monthIndex = nextMonth;
      state.itemIndex = delta > 0 ? 0 : state.months[nextMonth].items.length - 1;
      render();
    }

    function render() {
      const item = currentItem();
      if (!item) return;
      revokeObjectUrl();
      state.objectUrl = URL.createObjectURL(item.file);

      if (item.kind === "video") {
        const video = document.createElement("video");
        video.src = state.objectUrl;
        video.controls = true;
        video.autoplay = false;
        viewer.replaceChildren(video);
      } else {
        const img = document.createElement("img");
        img.src = state.objectUrl;
        img.alt = item.file.name;
        viewer.replaceChildren(img);
      }

      const month = currentMonth();
      positionEl.textContent = `${month.key}  ${state.itemIndex + 1}/${month.items.length}`;
      filenameEl.textContent = item.relativePath;
      updateButtons();
    }

    function revokeObjectUrl() {
      if (state.objectUrl) URL.revokeObjectURL(state.objectUrl);
      state.objectUrl = null;
    }

    function setButtonsEnabled(enabled) {
      for (const button of Object.values(buttons)) button.disabled = !enabled;
    }

    function updateButtons() {
      const month = currentMonth();
      const years = Array.from(new Set(state.months.map(item => item.key.slice(0, 4))));
      const currentYear = month ? month.key.slice(0, 4) : "";
      const currentYearIndex = years.indexOf(currentYear);

      buttons.prevYear.disabled = currentYearIndex <= 0;
      buttons.nextYear.disabled = currentYearIndex < 0 || currentYearIndex >= years.length - 1;
      buttons.prevMonth.disabled = state.monthIndex <= 0;
      buttons.nextMonth.disabled = state.monthIndex >= state.months.length - 1;
      buttons.prevItem.disabled = state.monthIndex === 0 && state.itemIndex === 0;
      buttons.nextItem.disabled =
        state.monthIndex === state.months.length - 1 &&
        month &&
        state.itemIndex === month.items.length - 1;
    }
  </script>
</body>
</html>
